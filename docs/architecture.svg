<svg width="1160" height="400" viewBox="0 0 1160 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <rect width="1160" height="400" rx="10" fill="#0b1220"/>
  <!-- swift app -->
  <rect x="40" y="70" width="240" height="260" rx="10" fill="#111c30" stroke="#3b4a63" stroke-width="1.5"/>
  <text x="60" y="100" fill="#e6edf3" font-size="16">menu bar app</text>
  <text x="60" y="120" fill="#8b98ab" font-size="12">Swift</text>
  <rect x="60" y="140" width="200" height="40" rx="6" fill="#0b1220" stroke="#3b4a63"/>
  <text x="72" y="165" fill="#cbd5e1" font-size="13">hotkey + mic (16 kHz)</text>
  <rect x="60" y="192" width="200" height="40" rx="6" fill="#0b1220" stroke="#3b4a63"/>
  <text x="72" y="217" fill="#cbd5e1" font-size="13">optional screenshot</text>
  <rect x="60" y="244" width="200" height="40" rx="6" fill="#0b1220" stroke="#3b4a63"/>
  <text x="72" y="269" fill="#cbd5e1" font-size="13">speaker</text>
  <!-- websocket -->
  <line x1="280" y1="160" x2="360" y2="160" stroke="#38bdf8" stroke-width="2"/>
  <path d="M 360 160 l -10 -5 v 10 z" fill="#38bdf8"/>
  <line x1="360" y1="264" x2="280" y2="264" stroke="#38bdf8" stroke-width="2"/>
  <path d="M 280 264 l 10 -5 v 10 z" fill="#38bdf8"/>
  <text x="286" y="148" fill="#8b98ab" font-size="12">audio + png</text>
  <text x="286" y="292" fill="#8b98ab" font-size="12">tokens + wav</text>
  <text x="272" y="216" fill="#64748b" font-size="12">WebSocket :8765</text>
  <!-- daemon -->
  <rect x="360" y="40" width="760" height="320" rx="10" fill="#111c30" stroke="#3b4a63" stroke-width="1.5"/>
  <text x="380" y="70" fill="#e6edf3" font-size="16">daemon</text>
  <text x="380" y="90" fill="#8b98ab" font-size="12">Python</text>
  <rect x="390" y="120" width="170" height="52" rx="6" fill="#0b1220" stroke="#3b4a63"/>
  <text x="404" y="143" fill="#cbd5e1" font-size="13">whisper.cpp</text>
  <text x="404" y="161" fill="#8b98ab" font-size="12">speech to text</text>
  <rect x="610" y="120" width="190" height="52" rx="6" fill="#0b1220" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="624" y="143" fill="#e6edf3" font-size="13">Qwen3-14B 4-bit</text>
  <text x="624" y="161" fill="#8b98ab" font-size="12">MLX, tool loop</text>
  <rect x="850" y="120" width="170" height="52" rx="6" fill="#0b1220" stroke="#3b4a63"/>
  <text x="864" y="143" fill="#cbd5e1" font-size="13">Kokoro-82M</text>
  <text x="864" y="161" fill="#8b98ab" font-size="12">text to speech</text>
  <line x1="560" y1="146" x2="610" y2="146" stroke="#8b98ab" stroke-width="1.5"/>
  <path d="M 610 146 l -9 -4.5 v 9 z" fill="#8b98ab"/>
  <line x1="800" y1="146" x2="850" y2="146" stroke="#8b98ab" stroke-width="1.5"/>
  <path d="M 850 146 l -9 -4.5 v 9 z" fill="#8b98ab"/>
  <text x="806" y="136" fill="#64748b" font-size="11">per</text>
  <text x="800" y="184" fill="#64748b" font-size="11">sentence</text>
  <!-- tools -->
  <rect x="610" y="220" width="190" height="110" rx="6" fill="#0b1220" stroke="#3b4a63"/>
  <text x="624" y="244" fill="#cbd5e1" font-size="13">tools</text>
  <text x="624" y="266" fill="#8b98ab" font-size="12">screen OCR / vision</text>
  <text x="624" y="284" fill="#8b98ab" font-size="12">AppleScript, run code</text>
  <text x="624" y="302" fill="#8b98ab" font-size="12">web search, memory</text>
  <line x1="705" y1="172" x2="705" y2="220" stroke="#8b98ab" stroke-width="1.5"/>
  <path d="M 705 220 l -4.5 -9 h 9 z" fill="#8b98ab"/>
  <path d="M 715 220 l 0 -48" stroke="#8b98ab" stroke-width="1.5" fill="none"/>
  <path d="M 715 172 l -4.5 9 h 9 z" fill="#8b98ab"/>
