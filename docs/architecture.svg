  <rect x="850" y="220" width="230" height="110" rx="6" fill="#0b1220" stroke="#f59e0b"/>
  <text x="864" y="244" fill="#e6edf3" font-size="13">HTTP /generate</text>
  <text x="864" y="266" fill="#8b98ab" font-size="12">continuous batching:</text>
  <text x="864" y="284" fill="#8b98ab" font-size="12">requests join the running</text>
  <text x="864" y="302" fill="#8b98ab" font-size="12">batch at token boundaries</text>
  <line x1="850" y1="250" x2="800" y2="160" stroke="#f59e0b" stroke-width="1.5"/>
  <path d="M 800 160 l 2 10 l 8 -6 z" fill="#f59e0b"/>
